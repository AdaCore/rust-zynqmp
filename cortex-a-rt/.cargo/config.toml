[build]
target = "aarch64-unknown-none"

[target.aarch64-unknown-none]
runner = "qemu-system-aarch64 -cpu cortex-a53 -machine xlnx-zcu102 -m 2G -nographic -semihosting-config enable=on,target=native -kernel"
rustflags = [
    "-C", "link-arg=-Tlink.x",
    # GNAT Pro for Rust uses GCC instead of lld to link on bareboard targets, which leads to errors
    # about missing crt0.o (eng/toolchain/rust/rust#645).
    "-C", "link-arg=-nostartfiles"
]
